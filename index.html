<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 灵签宝典</title>
    <style>
        body { font-family: 'STKaiti', '楷体', serif; background: #1a1a1a; color: #f1c40f; text-align: center; margin: 0; padding: 20px; }
        .card { background: #2c3e50; padding: 20px; border-radius: 20px; border: 2px solid #f1c40f; max-width: 450px; margin: auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .qiantong { font-size: 80px; cursor: pointer; display: inline-block; transition: transform 0.1s; }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: rotate(0deg); } 25% { transform: rotate(10deg); } 50% { transform: rotate(0deg); } 75% { transform: rotate(-10deg); } 100% { transform: rotate(0deg); } }
        button { background: #d35400; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 20px; cursor: pointer; font-size: 1.1rem; width: 100%; }
        #draw-result { display: none; margin-top: 20px; background: #fff; color: #333; padding: 20px; border-radius: 10px; border-left: 10px solid #d35400; }
        .rank { font-size: 24px; font-weight: bold; color: #e74c3c; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h1>🧧 2026 每日灵签</h1>
    <p>诚心默念心中所求，点击签筒抽签：</p>
    
    <div id="qiantong" class="qiantong" onclick="drawLucky()">🏺</div>
    
    <div id="status">点击签筒摇一摇</div>

    <div id="draw-result">
        <span class="rank" id="luckyRank"></span>
        <p id="luckyText" style="font-size: 18px; font-weight: bold;"></p>
        <p id="luckyDesc" style="color: #666; font-style: italic;"></p>
    </div>
    
    <hr style="margin: 30px 0; border: 0; border-top: 1px dashed #f1c40f;">
    <p>或者查询生肖运势：</p>
    <input type="date" id="birthday" style="padding: 8px; width: 70%;">
    <button onclick="alert('生肖功能已集成，请参考上一版本逻辑添加')">查询生肖</button>
</div>

<script>
    const allGua = [
        { rank: "上上签", title: "大吉大利", desc: "所求皆如意，所行化坦途。今年必有贵人相助。" },
        { rank: "上吉签", title: "锦上添花", desc: "事业稳步上升，感情和睦，利于远行求财。" },
        { rank: "中平签", title: "静待时机", desc: "目前时机未到，宜守不宜攻，凡事多加忍耐。" },
        { rank: "下下签", title: "谨慎避险", desc: "今日运势低迷，不宜做出重大决策，建议闭门读书。" }
    ];

    function drawLucky() {
        const tong = document.getElementById('qiantong');
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('draw-result');

        // 开始摇晃动画
        tong.classList.add('shake');
        status.innerText = "正在求签中...";
        resultDiv.style.display = 'none';

        // 1.5秒后出结果
        setTimeout(() => {
            tong.classList.remove('shake');
            const randomGua = allGua[Math.floor(Math.random() * allGua.length)];
            
            document.getElementById('luckyRank').innerText = randomGua.rank;
            document.getElementById('luckyText').innerText = randomGua.title;
            document.getElementById('luckyDesc').innerText = randomGua.desc;
            
            status.innerText = "签已落地！";
            resultDiv.style.display = 'block';
        }, 1500);
    }
</script>

</body>
</html>
